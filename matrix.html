<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Matrix</title>
    <style>
        /* 基础重置与黑客帝国风格全局设置 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* 防止出现滚动条 */
        }

        /* 画布作为背景 */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 前景的文本内容区域 */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6); /* 半透明黑色背景，让文字更易读 */
        }

        /* 打字机特效的光标 */
        .typewriter {
            font-size: 2rem;
            text-shadow: 0 0 5px #0f0;
            border-right: .15em solid #0f0;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(30, end), blink-caret .75s step-end infinite;
        }

        .system-msg {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #3f3;
            opacity: 0.8;
        }

        /* 动画关键帧 */
        @keyframes typing {
            from { width: 0 }
            to { width: 10em } /* 根据文字长度调整 */
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #0f0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="content">
        <div class="typewriter" id="text-container">Wake up, Neo...</div>
        <div class="system-msg">System failure. Press ANY KEY to reboot.</div>
    </div>

    <script>
        // 获取画布并设置上下文
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // 使画布全屏
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 字符集：包含日文片假名、拉丁字母和数字（经典的黑客帝国字符组成）
        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width / fontSize; // 计算列数

        // 记录每一列当前的Y坐标（初始在最顶部）
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        // 绘制代码雨的核心函数
        function draw() {
            // 绘制带有透明度的黑色矩形，覆盖整个画布，形成尾迹效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 设置文字颜色和字体
            ctx.fillStyle = '#0F0'; 
            ctx.font = fontSize + 'px monospace';

            // 循环遍历每一列
            for (let i = 0; i < drops.length; i++) {
                // 随机获取一个字符
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                
                // 绘制字符
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // 如果字符到达屏幕底部，或者随机触发重置，则将该列的Y坐标拉回顶部
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // Y坐标增加，字符下落
                drops[i]++;
            }
        }

        // 定时器，控制代码雨下落速度 (33毫秒约等于30帧/秒)
        setInterval(draw, 33);

        // 窗口大小改变时重置画布大小，避免变形
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // 简单交互：按下任意按键改变文字
        window.addEventListener('keydown', () => {
            document.getElementById('text-container').innerText = "Follow the white rabbit.";
            document.getElementById('text-container').style.animation = "none"; // 停止打字动画
        });
    </script>
</body>
</html>
